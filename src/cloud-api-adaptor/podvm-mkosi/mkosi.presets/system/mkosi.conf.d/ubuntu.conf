[Match]
Distribution=ubuntu

[Distribution]
Distribution=ubuntu
Release=noble
Repositories=main restricted universe multiverse

[Content]
CleanPackageMetadata=true
SkeletonTrees=../../resources/binaries-tree
Packages=
    linux-image-6.17.0-1016-gcp
    linux-headers-6.17.0-1016-gcp
    udev
    util-linux
    systemd
    dbus
    tpm2-tools
    iproute2
    iptables
    e2fsprogs
    cryptsetup
    ca-certificates
    systemd-resolved
    kmod
    pciutils
    linux-modules-nvidia-580-server-open-gcp
    nvidia-fabricmanager-580
    nvidia-utils-580-server
    libnvidia-nscq-580
    libnvidia-compute-580-server
    nvidia-compute-utils-580-server
    libnvidia-cfg1-580

RemoveFiles=/etc/issue
RemoveFiles=/etc/issue.net

# Remove for reproducible builds
RemoveFiles=/var/log
RemoveFiles=/var/cache
