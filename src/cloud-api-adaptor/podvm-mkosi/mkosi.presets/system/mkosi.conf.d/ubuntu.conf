[Match]
Distribution=ubuntu

[Distribution]
Distribution=ubuntu
Release=noble

[Content]
CleanPackageMetadata=true
SkeletonTrees=../../resources/binaries-tree
Packages=
    linux-image-generic
    udev
    util-linux
    systemd
    dbus
    tpm2-tools
    iproute2
    iptables
    e2fsprogs
    cryptsetup
    ca-certificates
    systemd-resolved
    nvidia-container-toolkit
    libnvidia-container1
    libnvidia-container-tools
    nvidia-driver
    cuda-drivers

RemoveFiles=/etc/issue
RemoveFiles=/etc/issue.net

# Remove for reproducible builds
RemoveFiles=/var/log
RemoveFiles=/var/cache
